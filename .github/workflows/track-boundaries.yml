name: Track Boundaries

on:
  pull_request:

jobs:
  enforce-track-boundaries:
    name: enforce-track-boundaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure origin/master is available
        run: git fetch origin master --depth=1

      - name: Enforce contributor track boundaries
        env:
          ALLOW_CROSS_TRACK: ${{ contains(join(github.event.pull_request.labels.*.name, ','), 'allow-cross-track') && '1' || '0' }}
        run: python3 tools/check_track_boundaries.py

      - name: Verify fixture - valid Track A only sample passes
        run: python3 tools/check_track_boundaries.py --changed-files-file .ci/fixtures/valid_track_a_only_files.txt

      - name: Verify fixture - mixed Track A + Track B sample fails
        run: |
          if python3 tools/check_track_boundaries.py --changed-files-file .ci/fixtures/invalid_cross_track_files.txt; then
            echo "Expected fixture to fail but it passed."
            exit 1
          fi
          echo "Invalid fixture failed as expected."
