name: Lane Owner Approval Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, review_requested, review_request_removed]
  pull_request_review:
    types: [submitted, dismissed]

jobs:
  lane-owner-approval-gate:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Validate lane approval coverage
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const number = pr.number;

            const laneRules = {
              platform: ['engine/', 'fb/', 'ui/', '.github/workflows/'],
              logic: ['pages/', 'plugins/', 'engine/deep_research/logic.py', 'tests/fixtures/'],
              'qa-contract': ['tests/', '.ci/', 'docs/contracts/'],
              observer: ['web/', 'scripts/run_web_observer.py'],
            };

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: number,
              per_page: 100,
            });

            const touchedLanes = new Set();
            const laneForPath = (filePath) => {
              const normalized = filePath.replace(/^\.\//, '');
              for (const [lane, rules] of Object.entries(laneRules)) {
                for (const rule of rules) {
                  if (rule.endsWith('/')) {
                    if (normalized.startsWith(rule)) touchedLanes.add(lane);
                  } else if (normalized === rule) {
                    touchedLanes.add(lane);
                  }
                }
              }
            };

            for (const file of files) {
              laneForPath(file.filename);
            }

            if (touchedLanes.size === 0) {
              core.info('No lane-owned files touched; skipping lane approval gate.');
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: number,
              per_page: 100,
            });

            // Keep latest review state per user.
            const latestByUser = new Map();
            for (const review of reviews) {
              if (!review.user || !review.user.login) continue;
              latestByUser.set(review.user.login, review.state);
            }
            const approvedUsers = [...latestByUser.entries()]
              .filter(([, state]) => state === 'APPROVED')
              .map(([login]) => login);

            const requiredApprovals = touchedLanes.size > 1 ? touchedLanes.size : 1;
            const approvalCount = approvedUsers.length;

            core.info(`Touched lanes: ${[...touchedLanes].sort().join(', ')}`);
            core.info(`Approved reviewers: ${approvedUsers.join(', ') || '(none)'}`);
            core.info(`Required approvals for this PR: ${requiredApprovals}`);

            if (approvalCount < requiredApprovals) {
              core.setFailed(
                `Insufficient lane-owner approvals: need ${requiredApprovals}, found ${approvalCount}. ` +
                `Cross-lane PRs require one approval per touched lane.`
              );
            }
