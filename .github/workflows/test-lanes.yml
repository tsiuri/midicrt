name: Test Lanes

on:
  pull_request:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      contract_schema_paths: ${{ steps.filter.outputs.contract_schema_paths }}
      replay_determinism_paths: ${{ steps.filter.outputs.replay_determinism_paths }}
      observer_bridge_paths: ${{ steps.filter.outputs.observer_bridge_paths }}
      snapshot_pubsub_paths: ${{ steps.filter.outputs.snapshot_pubsub_paths }}
      rollout_guard_paths: ${{ steps.filter.outputs.rollout_guard_paths }}
      track_boundary_paths: ${{ steps.filter.outputs.track_boundary_paths }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            contract_schema_paths:
              - 'engine/deep_research/**'
              - 'engine/state/schema.py'
              - 'tests/test_schema_contract.py'
              - 'tests/test_deep_research_replay_contracts.py'
              - 'tests/test_deep_research_contract_compat.py'
              - 'tests/fixtures/deep_research_contract_cases.json'
              - '.github/workflows/test-lanes.yml'
            replay_determinism_paths:
              - 'engine/deep_research/**'
              - 'engine/core.py'
              - 'engine/scheduler.py'
              - 'tests/test_engine_replay_determinism.py'
              - 'tests/fixtures/deep_research_sequences/**'
              - '.github/workflows/test-lanes.yml'
            observer_bridge_paths:
              - 'web/**'
              - 'engine/ipc.py'
              - 'tests/test_web_observer_bridge.py'
              - '.github/workflows/test-lanes.yml'
            snapshot_pubsub_paths:
              - 'engine/ipc.py'
              - 'web/**'
              - 'tests/test_ipc_pubsub.py'
              - 'tests/test_pianoroll_view_snapshot.py'
              - '.github/workflows/test-lanes.yml'
            rollout_guard_paths:
              - 'engine/deep_research/**'
              - 'engine/state/schema.py'
              - 'tests/fixtures/deep_research_contract_cases.json'
              - 'tools/check_deep_research_contract_rollout.py'
              - '.github/workflows/test-lanes.yml'
            track_boundary_paths:
              - 'docs/contributor_tracks.md'
              - 'docs/parallel_dev_playbook.md'
              - '.ci/**'
              - 'tools/check_track_boundaries.py'
              - 'engine/**'
              - 'pages/**'
              - 'plugins/**'
              - 'web/**'
              - '.github/workflows/test-lanes.yml'

  contract_schema_checks:
    runs-on: ubuntu-latest
    needs: detect_changes
    if: github.event_name != 'pull_request' || needs.detect_changes.outputs.contract_schema_paths == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure origin/master is available
        run: git fetch origin master --depth=1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Required gate: DeepResearch contract rollout policy
        run: python tools/check_deep_research_contract_rollout.py

      - name: Contract/schema compatibility checks
        run: |
          PYTHONPATH=. pytest -q \
            tests/test_schema_contract.py \
            tests/test_deep_research_replay_contracts.py \
            tests/test_deep_research_contract_compat.py

      - name: Build contract evidence payload
        if: always()
        run: |
          python - <<'PY'
          import json
          import re
          import subprocess
          from pathlib import Path

          platform_text = Path('engine/deep_research/platform.py').read_text(encoding='utf-8')
          major = re.search(r'^RESEARCH_CONTRACT_MAJOR_VERSION\s*=\s*(\d+)\s*$', platform_text, re.MULTILINE)
          minor = re.search(r'^RESEARCH_CONTRACT_MINOR_VERSION\s*=\s*(\d+)\s*$', platform_text, re.MULTILINE)
          version = f"{major.group(1)}.{minor.group(1)}" if major and minor else "unknown"

          changed = subprocess.check_output(
              ['git', 'diff', '--name-only', 'origin/master...HEAD'],
              text=True,
          ).splitlines()
          fixture_path = 'tests/fixtures/deep_research_contract_cases.json'
          fixture_updated = fixture_path in changed

          Path('ci_evidence_contract.json').write_text(
              json.dumps(
                  {
                      'contract_version': version,
                      'fixture_updated': fixture_updated,
                      'fixture_path': fixture_path,
                  },
                  indent=2,
              ) + '\n',
              encoding='utf-8',
          )
          PY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-evidence-contract
          path: ci_evidence_contract.json

  replay_determinism_tests:
    runs-on: ubuntu-latest
    needs: detect_changes
    if: github.event_name != 'pull_request' || needs.detect_changes.outputs.replay_determinism_paths == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Replay determinism tests
        run: PYTHONPATH=. pytest -q tests/test_engine_replay_determinism.py

      - name: Build determinism evidence payload
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
            'determinism_status': 'passed' if os.environ.get('GITHUB_JOB_STATUS', '').lower() != 'failure' else 'failed'
          }
          Path('ci_evidence_determinism.json').write_text(json.dumps(payload, indent=2) + '\n', encoding='utf-8')
          PY
        env:
          GITHUB_JOB_STATUS: ${{ job.status }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-evidence-determinism
          path: ci_evidence_determinism.json

  observer_bridge_compat_tests:
    runs-on: ubuntu-latest
    needs: detect_changes
    if: github.event_name != 'pull_request' || needs.detect_changes.outputs.observer_bridge_paths == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e '.[web]'
      - name: Observer bridge compatibility tests
        run: PYTHONPATH=. pytest -q tests/test_web_observer_bridge.py

  snapshot_pubsub_tests:
    runs-on: ubuntu-latest
    needs: detect_changes
    if: github.event_name != 'pull_request' || needs.detect_changes.outputs.snapshot_pubsub_paths == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e '.[web]'
      - name: Snapshot publish/subscribe tests
        run: |
          PYTHONPATH=. pytest -q \
            tests/test_ipc_pubsub.py \
            tests/test_pianoroll_view_snapshot.py

  track_boundary_gate:
    runs-on: ubuntu-latest
    needs: detect_changes
    if: github.event_name != 'pull_request' || needs.detect_changes.outputs.track_boundary_paths == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure origin/master is available
        run: git fetch origin master --depth=1
      - name: Required gate: cross-track policy
        run: python3 tools/check_track_boundaries.py

  ci_evidence_summary:
    runs-on: ubuntu-latest
    needs:
      - contract_schema_checks
      - replay_determinism_tests
      - observer_bridge_compat_tests
      - snapshot_pubsub_tests
      - track_boundary_gate
    if: always() && github.event_name == 'pull_request'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ci-evidence-*
          merge-multiple: true
          path: ci-evidence

      - name: Build PR CI evidence summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          evidence_dir = Path('ci-evidence')
          contract = {}
          determinism = {}

          contract_file = evidence_dir / 'ci_evidence_contract.json'
          determinism_file = evidence_dir / 'ci_evidence_determinism.json'

          if contract_file.exists():
            contract = json.loads(contract_file.read_text(encoding='utf-8'))
          if determinism_file.exists():
            determinism = json.loads(determinism_file.read_text(encoding='utf-8'))

          lines = [
            '# CI Evidence Summary',
            '',
            f"- Contract version: `{contract.get('contract_version', 'not-collected')}`",
            f"- Fixture updates: `{contract.get('fixture_updated', 'not-collected')}` ({contract.get('fixture_path', 'n/a')})",
            f"- Replay determinism status: `{determinism.get('determinism_status', 'not-collected')}`",
          ]

          summary_md = '\n'.join(lines) + '\n'
          Path('ci_evidence_summary.md').write_text(summary_md, encoding='utf-8')
          print(summary_md)
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-summary
          path: ci_evidence_summary.md

      - name: Add PR job summary
        run: cat ci_evidence_summary.md >> "$GITHUB_STEP_SUMMARY"
